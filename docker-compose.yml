services:
  minecraft-console:
    build: .
    container_name: minecraft-console
    restart: unless-stopped
    ports:
      - "${TAILSCALE_BIND_IP:-100.68.88.63}:3100:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_ALLOWED_EMAILS=${NEXT_PUBLIC_ALLOWED_EMAILS}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://100.68.88.63:3100}
      - MINECRAFT_ROOT=/minecraft-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/kanfullbuster/minecraft-server:/minecraft-server:rw
      - ./data:/app/data:rw
