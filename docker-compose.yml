services:
  minecraft-console:
    build: .
    container_name: minecraft-console
    restart: unless-stopped
    ports:
      - "${TAILSCALE_BIND_IP:?set TAILSCALE_BIND_IP}:3100:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_ALLOWED_EMAILS=${NEXT_PUBLIC_ALLOWED_EMAILS}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL}
      - MINECRAFT_ROOT=/minecraft-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_MINECRAFT_ROOT:?set HOST_MINECRAFT_ROOT}:/minecraft-server:rw
      - ./data:/app/data:rw
